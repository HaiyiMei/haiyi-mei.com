baseURL: "https://haiyi-mei.com"
languageCode: "en-us"
title: "Haiyi Mei"
theme: hugo-profile

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

blackfriday:
  plainIDAnchors: true
  hrefTargetBlank: true

Paginate: 3
enableRobotsTXT: true
# disqusShortname: your-disqus-shortname
googleAnalytics: G-8T9VFZSLDR

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    -
    # - identifier: blog
    #   name: Blog
    #   title: Blog posts
    #   url: /blogs
    #   weight: 1
    # - identifier: gallery
